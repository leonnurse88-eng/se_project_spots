<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="Author" content="Leon Nurse" />
    <meta
      name="description"
      content="Interactive social media application where users can add or remove photos"
    />
    <link rel="stylesheet" href="./pages/index.css" />
    <link rel="icon" href="./favicon.ico" type="image/x-icon" />
    <title>Spots</title>
  </head>
  <body>
    <div class="page">
      <div class="page__content">
        <header class="header">
          <img src="./images/logo.svg" alt="spots logo" class="header__logo" />
        </header>
        <main class="content">
          <section class="profile page__section">
            <img
              src="./images/avatar.jpg"
              alt="coleman avatar"
              class="profile__avatar"
            />
            <div class="profile__column">
              <h1 class="profile__name">Bessie Coleman</h1>
              <p class="profile__description">Civil Aviator</p>
              <button type="button" class="profile__edit-btn">
                <img src="./images/pencil.svg" alt="pencil image" />Edit Profile
              </button>
            </div>
            <button type="button" class="profile__new-post-btn">
              <img src="./images/plus.svg" alt="add button" />New Post
            </button>
          </section>
          <section class="cards page__section">
            <ul class="cards__list">
              <template id="card_template">
                <li class="card">
                  <button class="card__delete-button" type="button"></button>
                  <img src="#" alt="" class="card__image" />
                  <div class="card__content">
                    <h2 class="card__title"></h2>
                    <button type="button" class="card__like-button"></button>
                  </div>
                </li>
              </template>
            </ul>
          </section>
        </main>
        <footer class="footer page__section">
          <div class="footer__content">
            <p class="footer__copyright">2025 &copy; Spots</p>
          </div>
        </footer>
      </div>
      <div class="modal" id="new-post-modal">
  <div class="modal__container">
    <button type="button" class="modal__close-btn"></button>
    <h2 class="modal__title">New Post</h2>
    <form class="modal__form">
      <label for="new-post-link-input" class="modal__label">
        Image link
        <input
          id="new-post-link-input"
          type="text"
          class="modal__input"
          placeholder="Paste a link to the picture"
          required
        />
      </label>
      <label for="new-post-caption-input" class="modal__label">
        Caption
        <input
          id="new-post-caption-input"
          type="text"
          class="modal__input"
          placeholder="Enter a caption"
          required
        />
      </label>
      <button type="submit" class="modal__submit-btn">SAVE</button>
    </form>
  </div>
</div>
      <div class="modal" id="edit-profile-modal">
        <div class="modal__container">
          <button type="button" class="modal__close-btn"></button>
          <h2 class="modal__title">Edit profile</h2>
          <form class="modal__form">
            <label for="edit-profile-name-input" class="modal__label"
              >Name<input
                id="edit-profile-name-input"
                type="text"
                class="modal__input"
                placeholder="Type your name"
              />
            </label>
            <label for="edit-profile-description-input" class="modal__label"
              >Description<input
                id="edit-profile-description-input"
                type="text"
                class="modal__input"
                placeholder="Describe yourself"
            /></label>
            <button type="submit" class="modal__submit-btn">SAVE</button>
          </form>
        </div>
      </div>
    <div class="modal" id="preview-modal">
        <div class="modal__container">
          <button type="button" class="modal__close-btn modal__close-btn_type_preview"></button>
          <img src="https://practicum-content.s3.us-west-1.amazonaws.com/software-engineer/spots/7-photo-by-griffin-wooldridge-from-pexels.jpg" alt="" class="modal__image">
          <p class="modal__caption">Golden Gate Bridge</p>
        </div>
      </div>
    <script src="./scripts/index.js"></script>
  </body>
</html>
